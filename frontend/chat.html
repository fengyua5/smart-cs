<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能客服</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; height: 100vh; display: flex; justify-content: center; align-items: center; }
.chat-container { width: 420px; height: 600px; background: #fff; border-radius: 12px; box-shadow: 0 2px 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
.chat-header { background: #4f46e5; color: #fff; padding: 16px 20px; text-align: center; }
.chat-header h1 { font-size: 18px; font-weight: 600; }
.chat-header p { font-size: 12px; opacity: 0.8; margin-top: 4px; }
.messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.message { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.6; word-break: break-word; }
.message.user { background: #4f46e5; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
.message.bot { background: #f0f0f0; color: #333; align-self: flex-start; border-bottom-left-radius: 4px; }
.message.review { background: #fff3e0; color: #e65100; align-self: flex-start; border-bottom-left-radius: 4px; border-left: 3px solid #ff9800; }
.message .confidence { font-size: 11px; color: #999; margin-top: 6px; }
.message .review-badge { display: inline-block; background: #ff9800; color: #fff; font-size: 10px; padding: 2px 8px; border-radius: 10px; margin-top: 6px; }
.input-area { padding: 12px 16px; border-top: 1px solid #e0e0e0; display: flex; gap: 8px; }
.input-area input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
.input-area input:focus { border-color: #4f46e5; }
.input-area button { padding: 10px 20px; background: #4f46e5; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
.input-area button:disabled { opacity: 0.6; cursor: not-allowed; }
.typing { display: flex; gap: 4px; padding: 8px 0; }
.typing span { width: 6px; height: 6px; background: #999; border-radius: 50%; animation: typing 1.4s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
</style>
</head>
<body>
<div class="chat-container">
<div class="chat-header">
<h1>🤖 智能客服</h1>
<p>AI 智能回复 · 低置信度转人工</p>
</div>
<div class="messages" id="messages">
<div class="message bot">您好！我是智能客服助手，请描述您遇到的问题。</div>
</div>
<div class="input-area">
<input type="text" id="questionInput" placeholder="请输入您的问题..." onkeydown="if(event.key==='Enter') send()">
<button id="sendBtn" onclick="send()">发送</button>
</div>
</div>
<script>
const SESSION_ID = 'session_' + Date.now();
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('questionInput');
const sendBtn = document.getElementById('sendBtn');

async function send() {
const question = inputEl.value.trim();
if (!question) return;
inputEl.value = '';
addMessage(question, 'user');
showTyping();
sendBtn.disabled = true;
try {
const res = await fetch('/api/chat', {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({ session_id: SESSION_ID, question }),
});
const data = await res.json();
hideTyping();
addBotMessage(data);
} catch (e) {
hideTyping();
addMessage('抱歉，服务暂时不可用，请稍后再试。', 'bot');
} finally {
sendBtn.disabled = false;
inputEl.focus();
}
}

function addMessage(text, role) {
const div = document.createElement('div');
div.className = `message ${role}`;
div.textContent = text;
messagesEl.appendChild(div);
messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addBotMessage(data) {
const div = document.createElement('div');
if (data.need_review) {
div.className = 'message review';
const text = document.createElement('div');
text.textContent = data.answer;
div.appendChild(text);
const badge = document.createElement('div');
badge.className = 'review-badge';
badge.textContent = '⏳ 待人工审核';
div.appendChild(badge);
} else {
div.className = 'message bot';
div.textContent = data.answer;
}
const cf = document.createElement('div');
cf.className = 'confidence';
cf.textContent = `置信度: ${(data.confidence * 100).toFixed(0)}%`;
div.appendChild(cf);
messagesEl.appendChild(div);
messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showTyping() {
const div = document.createElement('div');
div.className = 'message bot';
div.id = 'typing-indicator';
div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
messagesEl.appendChild(div);
messagesEl.scrollTop = messagesEl.scrollHeight;
}

function hideTyping() {
const el = document.getElementById('typing-indicator');
if (el) el.remove();
}
</script>
</body>
</html>
