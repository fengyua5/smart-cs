<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知识库管理 - Smart CS</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; padding: 32px; color: #333; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
.header h1 { font-size: 22px; }
.nav { display: flex; gap: 12px; }
.nav a { color: #4f46e5; text-decoration: none; font-size: 14px; }
.upload-area { background: #fff; border: 2px dashed #ddd; border-radius: 12px; padding: 40px; text-align: center; cursor: pointer; transition: all .2s; margin-bottom: 24px; }
.upload-area:hover, .upload-area.dragover { border-color: #4f46e5; background: #f8f8ff; }
.upload-area .icon { font-size: 40px; margin-bottom: 8px; }
.upload-area p { color: #999; font-size: 14px; }
.upload-area input { display: none; }
.toast { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 8px; color: #fff; font-size: 14px; z-index: 100; transform: translateX(120%); transition: transform .3s; }
.toast.show { transform: translateX(0); }
.toast.success { background: #10b981; }
.toast.error { background: #ef4444; }
.toast.info { background: #3b82f6; }
.toolbar { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; }
.toolbar button { padding: 8px 16px; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; }
.btn-primary { background: #4f46e5; color: #fff; }
.btn-outline { background: #fff; border: 1px solid #ddd; color: #666; }
.btn-danger { background: #ef4444; color: #fff; }
.toolbar .count { font-size: 13px; color: #999; margin-left: auto; }
.file-list { background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.file-item { display: flex; align-items: center; padding: 14px 20px; border-bottom: 1px solid #f0f0f0; }
.file-item:last-child { border-bottom: none; }
.file-item .name { flex: 1; font-size: 14px; font-weight: 500; }
.file-item .meta { font-size: 12px; color: #999; margin-right: 20px; }
.file-item .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #e8f5e9; color: #2e7d32; margin-right: 12px; }
.file-item .del { color: #ef4444; cursor: pointer; font-size: 18px; opacity: 0.5; }
.file-item .del:hover { opacity: 1; }
.empty-state { text-align: center; padding: 60px 20px; color: #999; }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="header">
<h1>📚 知识库管理</h1>
<div class="nav">
<a href="/static/chat.html" target="_blank">聊天窗口</a>
<a href="/static/review.html" target="_blank">审核面板</a>
</div>
</div>

<div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
<div class="icon">📄</div>
<p>点击或拖拽 .md / .txt 文件到此处上传</p>
<input type="file" id="fileInput" accept=".md,.txt" multiple onchange="handleFiles(this.files)">
</div>

<div class="toolbar">
<button class="btn-primary" onclick="reimportAll()">🔄 重新导入全部</button>
<button class="btn-outline" onclick="loadFiles()">刷新列表</button>
<span class="count" id="fileCount"></span>
</div>

<div class="file-list" id="fileList">
<div class="empty-state"><div class="icon">📂</div><p>暂无知识文件</p></div>
</div>

<div id="toast" class="toast"></div>

<script>
async function loadFiles() {
const container = document.getElementById('fileList');
const countEl = document.getElementById('fileCount');
try {
const res = await fetch('/api/portal/files');
const files = await res.json();
countEl.textContent = `共 ${files.length} 个文件`;
if (files.length === 0) {
container.innerHTML = '<div class="empty-state"><div class="icon">📂</div><p>暂无知识文件</p></div>';
return;
}
container.innerHTML = files.map(f => {
const size = f.file_size > 1024 ? (f.file_size/1024).toFixed(1)+'KB' : f.file_size+'B';
return `<div class="file-item">
<span class="badge">${f.chunk_count} 片段</span>
<span class="name">${escapeHtml(f.filename)}</span>
<span class="meta">${size}</span>
<span class="meta">${formatTime(f.imported_at)}</span>
<span class="del" onclick="deleteFile(${f.id}, '${escapeHtml(f.filename)}')">✕</span>
</div>`;
}).join('');
} catch (e) {
container.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><p>加载失败，请检查服务是否运行</p></div>';
}
}

async function handleFiles(files) {
for (const file of files) {
const form = new FormData();
form.append('file', file);
try {
const res = await fetch('/api/portal/upload', { method: 'POST', body: form });
const data = await res.json();
if (data.error) showToast(data.error, 'error');
else if (data.status === 'skipped') showToast(`${file.name}: 已跳过（去重）`, 'info');
else showToast(`${file.name}: 导入成功`, 'success');
} catch (e) {
showToast(`${file.name}: 上传失败`, 'error');
}
}
loadFiles();
}

async function deleteFile(id, name) {
if (!confirm(`确定删除 "${name}" 吗？`)) return;
try {
const res = await fetch(`/api/portal/files/${id}`, { method: 'DELETE' });
const data = await res.json();
if (data.error) showToast(data.error, 'error');
else showToast(`${name}: 已删除`, 'success');
loadFiles();
} catch (e) {
showToast('删除失败', 'error');
}
}

async function reimportAll() {
showToast('正在重新导入...', 'info');
try {
const res = await fetch('/api/portal/reimport', { method: 'POST' });
const data = await res.json();
const imported = data.results.filter(r => r.status === 'imported' || r.status === 'updated').length;
const skipped = data.results.filter(r => r.status === 'skipped').length;
showToast(`导入完成: ${imported} 个新文件, ${skipped} 个已跳过`, 'success');
loadFiles();
} catch (e) {
showToast('导入失败', 'error');
}
}

const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
e.preventDefault();
dropZone.classList.remove('dragover');
handleFiles(e.dataTransfer.files);
});

let toastTimer;
function showToast(msg, type) {
const el = document.getElementById('toast');
el.className = `toast ${type}`;
el.textContent = msg;
el.classList.add('show');
clearTimeout(toastTimer);
toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
function formatTime(iso) { if (!iso) return ''; const d = new Date(iso); return `${d.toLocaleDateString()} ${d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}`; }

loadFiles();
</script>
</body>
</html>
